<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Early Draft - Mograph</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Inter:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; }

  :root {
    --bg-main: #f8fafc;
    --card-bg: #ffffff;
    --border: #e2e8f0;
    --text-main: #0f172a;
    --text-muted: #64748b;
    --accent-1: #6366f1; /* Indigo - vague desc */
    --accent-2: #f59e0b; /* Amber - rough outline */
    --accent-3: #10b981; /* Emerald - early draft */
  }

  body, html {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    background-color: var(--bg-main);
    color: var(--text-main);
    font-family: 'Inter', sans-serif;
    color-scheme: light;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .canvas {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 3vmin;
  }

  .list-item {
    display: flex;
    align-items: center;
    gap: 4vmin;
    background: var(--card-bg);
    padding: 3vmin 5vmin;
    border-radius: 4vmin;
    box-shadow: 0 2vmin 6vmin rgba(0,0,0,0.03);
    border: 2px solid var(--border);
    width: 85vmin;
    max-width: 800px;
    
    --enter-delay: calc(0.5s + var(--index) * 0.3s);
    --exit-delay: calc(4.5s + var(--index) * 0.15s);
    
    animation: 
      cardEnter 0.8s var(--enter-delay) cubic-bezier(0.16, 1, 0.3, 1) both,
      cardExit 0.6s var(--exit-delay) cubic-bezier(0.36, 0, 0.64, 1) forwards;
  }

  .icon-wrap {
    width: 10vmin;
    height: 10vmin;
    border-radius: 2.5vmin;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-shrink: 0;
  }
  
  .icon-wrap svg {
    width: 5vmin;
    height: 5vmin;
  }

  .item-text {
    font-family: 'Outfit', sans-serif;
    font-size: 4.5vmin;
    font-weight: 600;
    color: var(--text-main);
  }

  /* 0% keyframe strictly handles invisible state to prevent early rendering */
  @keyframes cardEnter {
    0% { 
      transform: translateY(8vmin) scale(0.9); 
      clip-path: inset(100% 0 0 0); 
    }
    100% { 
      transform: translateY(0) scale(1); 
      clip-path: inset(-50% -50% -50% -50%); 
    }
  }

  @keyframes cardExit {
    0% { 
      transform: translateY(0) scale(1); 
      clip-path: inset(-50% -50% -50% -50%); 
    }
    100% { 
      transform: translateY(-8vmin) scale(0.9); 
      clip-path: inset(0 0 100% 0); 
    }
  }

</style>
</head>
<body>

  <div class="canvas">
    
    <div class="list-item" style="--index: 0;">
      <div class="icon-wrap" style="background: var(--accent-1)">
        <!-- Message Square with dashes -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          <line x1="9" y1="10" x2="15" y2="10" stroke-dasharray="2 2"></line>
        </svg>
      </div>
      <div class="item-text">A vague description</div>
    </div>

    <div class="list-item" style="--index: 1;">
      <div class="icon-wrap" style="background: var(--accent-2)">
        <!-- List / Outline -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"></line>
          <line x1="8" y1="12" x2="21" y2="12"></line>
          <line x1="8" y1="18" x2="21" y2="18"></line>
          <line x1="3" y1="6" x2="3.01" y2="6"></line>
          <line x1="3" y1="12" x2="3.01" y2="12"></line>
          <line x1="3" y1="18" x2="3.01" y2="18"></line>
        </svg>
      </div>
      <div class="item-text">A rough outline</div>
    </div>

    <div class="list-item" style="--index: 2;">
      <div class="icon-wrap" style="background: var(--accent-3)">
        <!-- File Pen / Draft -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <path d="M10.5 14.5l5-5a2.121 2.121 0 0 1 3 3l-5 5-4 1 1-4z"></path>
        </svg>
      </div>
      <div class="item-text">An early draft</div>
    </div>

  </div>

</body>
</html>
