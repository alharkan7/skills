<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="100%" height="100%">
  <defs>
    <!-- Arrow marker for connectors -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8ca4bc" />
    </marker>
    
    <!-- Expanded filter bounds prevent shadow clipping -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#a0b0c0" flood-opacity="0.15" />
    </filter>
  </defs>
  
  <rect width="1000" height="600" fill="#fefeff" />
  
  <g font-family="Helvetica Neue, Arial, sans-serif">
    <!-- Diagram Title -->
    <text x="50" y="50" font-size="24" font-weight="bold" fill="#0f172a">Diagram Title</text>
    
    <!-- Connector behind card -->
    <path d="M 250 150 Q 500 150 500 300" stroke="#8ca4bc" stroke-width="2.5" fill="none" marker-end="url(#arrow)" />
    
    <!-- Elevated Card -->
    <rect x="50" y="100" width="400" height="200" rx="12" fill="#ffffff" filter="url(#shadow)" stroke="#e2e8f0" />
  </g>
</svg>
